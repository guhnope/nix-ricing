# ~/.config/hypr/hyprlauncher.conf

[general]
# Controls whether modules keep an analytical plain-text frequency cache
cache = true

[finders]
default_finder = desktop
# Enable built-in emoji, math calculator (=), and unicode finder (.) modules
unicode_prefix = .
math_prefix = =

[ui]
desktop_icons = true

# 🛡️ THE BUBBLEWRAP FIX:
# This prefixes every app launch with your session manager sandbox.
# If you aren't using UWSM on this specific test run, change it to "setpriv --reset-env --"
desktop_launch_prefix = setpriv --reset-env --
