# ~/.config/hypr/hyprpaper.conf

# 1. Point the path directly to a directory folder instead of a flat file
wallpaper {
    monitor =
    path = ~/Pictures/Wallpapers/Gruvbox
    fit_mode = cover

    # 2. Set your custom layout parameters
    timeout = 600       # Time between switches (in seconds; 600 = 10 minutes)
    order = random      # Cycles through the directory randomly
    recursive = false   # Set to true if you want it to scan sub-folders
}

# Keep IPC active so your utility hotkeys can still trigger overrides
ipc = true
splash = false
