# --- Reload Config ---
bind=SUPER,R,reload_config

# --- Core Shell & Launchers ---
bind=SUPER,Return,spawn,ghostty
bind=SUPER,Space,spawn,fuzzel
bind=SUPER,L,spawn,gtklock
bind=SUPER,X,spawn,wlogout --buttons-per-row 4
bind=SUPER,B,spawn,helium

# --- Session Control ---
bind=SUPER+CTRL,Q,quit
bind=SUPER,Q,killclient

# --- Focus Movement ---
bind=SUPER,LEFT,movefocus,l
bind=SUPER,RIGHT,movefocus,r
bind=SUPER,UP,movefocus,u
bind=SUPER,DOWN,movefocus,d

# --- Window Position Swapping ---
bind=SUPER+SHIFT,LEFT,exchange_client,l
bind=SUPER+SHIFT,RIGHT,exchange_client,r

# --- Global Window States ---
bind=SUPER,G,toggleglobal
bind=ALT,Tab,toggleoverview
bind=ALT,backslash,togglefloating
bind=ALT,A,togglemaximizescreen
bind=ALT,F,togglefullscreen
bind=ALT+SHIFT,F,togglefakefullscreen
bind=SUPER,I,minimized
bind=SUPER,O,toggleoverlay
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,Z,toggle_scratchpad

# --- Layout Controls ---
bind=ALT,E,set_proportion,1.0
bind=ALT,X,switch_proportion_preset
bind=SUPER,E,incnmaster,1
bind=SUPER,T,incnmaster,-1
bind=ALT,S,zoom
bind=CTRL+SUPER,I,setlayout,tile
bind=CTRL+SUPER,L,setlayout,scroller
bind=SUPER,N,switch_layout

# --- Tag/Workspace Navigation ---
# 1. Focus Tag (SUPER + Number)
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# 2. Move Window to Tag (SUPER+SHIFT + Number)
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# 3. Multi-Tag Interlacing (SUPER+CTRL + Number)
bind=SUPER+CTRL,1,toggletag,1
bind=SUPER+CTRL,2,toggletag,2
bind=SUPER+CTRL,3,toggletag,3
bind=SUPER+CTRL,4,toggletag,4
bind=SUPER+CTRL,5,toggletag,5
bind=SUPER+CTRL,6,toggletag,6
bind=SUPER+CTRL,7,toggletag,7
bind=SUPER+CTRL,8,toggletag,8
bind=SUPER+CTRL,9,toggletag,9

# 4. Multi-View Toggles (SUPER+ALT + Number)
bind=SUPER+ALT,1,toggleview,1
bind=SUPER+ALT,2,toggleview,2
bind=SUPER+ALT,3,toggleview,3
bind=SUPER+ALT,4,toggleview,4
bind=SUPER+ALT,5,toggleview,5
bind=SUPER+ALT,6,toggleview,6
bind=SUPER+ALT,7,toggleview,7
bind=SUPER+ALT,8,toggleview,8
bind=SUPER+ALT,9,toggleview,9

# --- Workspace Rotation & Offset ---
bind=CTRL+ALT,LEFT,viewprev
bind=CTRL+ALT,RIGHT,viewnext
bind=SUPER,Page_Down,view_tag_offset,+3
bind=SUPER,Page_Up,view_tag_offset,-3
bind=SUPER+SHIFT,Page_Down,tag_offset,+3
bind=SUPER+SHIFT,Page_Up,tag_offset,-3

# --- Media ---
bind=,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind=,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Mouse Core Interceptors
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=alt,btn_middle,set_proportion,0.5
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=SUPER+CTRL,btn_left,minimized
mousebind=SUPER+CTRL,btn_right,killclient
mousebind=SUPER+CTRL,btn_middle,togglefullscreen

# Continuous Wheel Tracking Maps
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=alt,UP,focusdir,left
axisbind=alt,DOWN,focusdir,right
axisbind=shift+super,UP,exchange_client,left
axisbind=shift+super,DOWN,exchange_client,right

# Hardware Media Keys (Bound directly through C++ Noctalia message hooks)
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,noctalia msg wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- Horizontal Panning (Within the same "workspace row") ---
bind = SUPER, Left, viewprev
bind = SUPER, Right, viewnext

# --- Vertical Workspace Jumping (Grid Layer Offset) ---
bind = SUPER, Down, view_tag_offset, +3
bind = SUPER, Up, view_tag_offset, -3
bind = SUPER_SHIFT, Down, tag_offset, +3
bind = SUPER_SHIFT, Up, tag_offset, -3
